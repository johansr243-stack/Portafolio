<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contacto.css" />
  </head>

  <body>
    <header>
      <nav>
        <div>
          <img
            class="logo"
            src="./imagenes/connectdevelop-brands-solid-full.svg"
            alt="logo"
          />
        </div>

        <ul class="menu_list">
          <li>
            <a href="./index.html" class="menu_link">INICIO</a>
          </li>

          <li>
            <a href="./contacto.html" class="menu_link" target="_blank"
              >CONTACTO</a
            >
          </li>

          <li>
            <a href="./galeria.html" class="menu_link" target="_blank"
              >GALERIA</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="forms" >
        <h2 class="subtittle">Información personal</h2>
        <label class="form1" for="Formulario">
          <input class="space" type="text" id="Nombre" placeholder="Nombre" />
          <input class="space" type="text" placeholder="Apellido" />
          <input class="space" type="email" placeholder="ejemplo@gmail.com" />
          <input class="space" type="number" placeholder="Número de teléfono" />
          <input class="space" type="text" placeholder="País" />
          <input class="space" type="text" placeholder="Ciudad" />
        </label>
      </section>

      <section class="ofert">
        <fieldset class="ingles">
          <legend class="ingles_requerido">Ingles</legend>
          <select class="form-control" name="Ingles" id="Ingles">
            Ingles
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="B1">B1</option>
            <option value="B2">B2</option>
          </select>

          <button type="submit">Enviar</button>
        </fieldset>
      </section>
    </main>

    <footer>
      <li> <a class="derechos" href="https://bitinstitute.online/images/Politica-de-Privacidad-2023.pdf" target="_blank">Derechos reservados BIT </a></li>
    </footer>
  </body>
</html>
