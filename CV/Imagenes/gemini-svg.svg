<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Importando una fuente estilo tecnológico desde Google Fonts */
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg { fill: #0b0c10; } /* Fondo oscuro para resaltar el blanco y rojo */
      
      /* Estilos de Texto */
      .text-name { font-family: 'Share Tech Mono', monospace, sans-serif; font-size: 28px; fill: #ffffff; letter-spacing: 4px; text-anchor: middle; }
      .text-surname { font-family: 'Share Tech Mono', monospace, sans-serif; font-size: 20px; fill: #e02424; letter-spacing: 6px; text-anchor: middle; }
      .text-13 { font-family: 'Share Tech Mono', monospace, sans-serif; font-size: 72px; fill: #e02424; font-weight: bold; text-anchor: middle; }
      
      /* Estilos de Líneas de Circuito */
      .tech-line-white { stroke: #ffffff; stroke-width: 4; fill: none; stroke-linejoin: miter; }
      .tech-line-red { stroke: #e02424; stroke-width: 4; fill: none; stroke-linejoin: miter; }
      .tech-cross { stroke: #ffffff; stroke-width: 12; fill: none; stroke-linecap: square; }
      .tech-node-red { fill: #e02424; }
      .tech-node-white { fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="600" height="600" />

  <path d="M 120 40 L 480 40 L 510 70 L 510 110 L 480 140 L 120 140 L 90 110 L 90 70 Z" stroke="#1f232e" stroke-width="2" fill="none" />
  <text x="300" y="90" class="text-name">JOHAN DANIEL</text>
  <text x="300" y="125" class="text-surname">PATIÑO MARTINEZ</text>

  <text x="300" y="345" class="text-13">13</text>

  <path d="M 300 180 L 300 250" class="tech-cross" />
  <rect x="295" y="160" width="10" height="10" class="tech-node-red" />
  
  <path d="M 300 390 L 300 460" class="tech-cross" />
  <rect x="295" y="470" width="10" height="10" class="tech-node-red" />
  
  <path d="M 170 320 L 240 320" class="tech-cross" />
  <rect x="150" y="315" width="10" height="10" class="tech-node-red" />
  
  <path d="M 360 320 L 430 320" class="tech-cross" />
  <rect x="440" y="315" width="10" height="10" class="tech-node-red" />

  <path d="M 280 200 L 220 200 L 190 230 L 190 280" class="tech-line-white" />
  <circle cx="190" cy="280" r="5" class="tech-node-red" />
  
  <path d="M 320 200 L 380 200 L 410 230 L 410 280 L 380 310" class="tech-line-red" />
  <circle cx="380" cy="310" r="5" class="tech-node-white" />

  <path d="M 280 440 L 220 440 L 190 410 L 190 360 L 220 330" class="tech-line-red" />
  <circle cx="220" cy="330" r="5" class="tech-node-white" />

  <path d="M 320 440 L 380 440 L 410 410 L 410 360 L 380 330 L 380 390" class="tech-line-white" />
  <circle cx="380" cy="390" r="5" class="tech-node-red" />

  <path d="M 100 320 L 140 320 L 160 340" class="tech-line-red" stroke-width="2" />
  <path d="M 500 320 L 460 320 L 440 300" class="tech-line-white" stroke-width="2" />
  <path d="M 300 520 L 300 490 L 320 470" class="tech-line-red" stroke-width="2" />
</svg>
